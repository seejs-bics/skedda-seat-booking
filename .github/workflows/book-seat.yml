name: Book Skedda Seat

on:
  workflow_dispatch: # Triggered externally by cron-job.org

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run booking script
        env:
          SKEDDA_URL: ${{ secrets.SKEDDA_URL }}
          SKEDDA_EMAIL: ${{ secrets.SKEDDA_EMAIL }}
          SKEDDA_PASS: ${{ secrets.SKEDDA_PASS }}
          SEAT_PRIORITY: ${{ secrets.SEAT_PRIORITY }}
          BOOKING_START: "08:00"
          BOOKING_END: "17:00"
          DAYS_AHEAD: "12"
          BOOKING_DAYS: "0,1,2,3,4"
          TIMEZONE: "Asia/Singapore"
        run: python book_seat.py

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error-screenshot.png
          if-no-files-found: ignore
